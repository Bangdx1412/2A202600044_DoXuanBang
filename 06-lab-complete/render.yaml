services:
  - type: web
    name: ai-agent-production
    runtime: docker
    rootDir: 06-lab-complete
    dockerfilePath: Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - 06-lab-complete/**
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: APP_NAME
        value: Production AI Agent
      - key: APP_VERSION
        value: "1.0.0"
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS
        value: "30"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: agent-cache
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
  - type: keyvalue
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
